        <script>
        (function () {
            var canvas = document.getElementById('wind-canvas');
            var ctx = canvas.getContext('2d');

            // Flow field grid resolution
            var COLS = 50;
            var ROWS = 35;
            var NUM_PARTICLES = 700;
            var field = [];
            var particles = [];

            // Wind defaults (fallback if API unavailable)
            var windDir = 270;   // meteorological: degrees FROM (270 = from west)
            var windSpeed = 4;   // m/s

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                buildField();
            }

            // Meteorological wind direction -> canvas flow angle
            // Met dir = direction wind comes FROM (0=N,90=E,180=S,270=W)
            // We want direction wind blows TO, in canvas coords (right=0, down=90)
            function metDirToCanvasAngle(deg) {
                // "To" direction in standard math: 90 - (deg + 180)
                var mathDeg = 90 - ((deg + 180) % 360);
                return mathDeg * Math.PI / 180;
            }

            function buildField() {
                field = [];
                var baseAngle = metDirToCanvasAngle(windDir);
                var speedFactor = Math.min(windSpeed / 10, 1.5);
                for (var row = 0; row < ROWS; row++) {
                    for (var col = 0; col < COLS; col++) {
                        // Subtle organic variation — kept small so all particles
                        // travel in roughly the same direction
                        var nx = col / COLS;
                        var ny = row / ROWS;
                        var variation =
                            Math.sin(nx * 3.14 + ny * 2.71) * 0.02 +
                            Math.cos(nx * 1.73 - ny * 3.14) * 0.015 +
                            Math.sin((nx + ny) * 5.0) * 0.01;
                        field.push({
                            angle: baseAngle + variation,
                            speed: (0.6 + speedFactor * 0.8 + Math.abs(variation) * 0.3)
                        });
                    }
                }
            }

            function getCell(x, y) {
                var col = Math.floor(x / canvas.width * COLS);
                var row = Math.floor(y / canvas.height * ROWS);
                col = Math.max(0, Math.min(COLS - 1, col));
                row = Math.max(0, Math.min(ROWS - 1, row));
                return field[row * COLS + col] || { angle: 0, speed: 1 };
            }

            var TRAIL_LENGTH = 25;

            function resetParticle(p) {
                p.x = Math.random() * canvas.width;
                p.y = Math.random() * canvas.height;
                p.age = 0;
                p.maxAge = 120 + Math.random() * 180;
                p.alpha = 0.45 + Math.random() * 0.45;
                p.width = 1.0 + Math.random() * 1.2;
                p.px = p.x;
                p.py = p.y;
                p.trail = [];
            }

            function initParticles() {
                particles = [];
                for (var i = 0; i < NUM_PARTICLES; i++) {
                    var p = { trail: [] };
                    resetParticle(p);
                    p.age = Math.random() * p.maxAge; // stagger ages
                    particles.push(p);
                }
            }

            function animate() {
                // Clear canvas each frame so the background image shows through
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (var i = 0; i < particles.length; i++) {
                    var p = particles[i];
                    p.age++;

                    if (p.age > p.maxAge) {
                        resetParticle(p);
                        continue;
                    }

                    var cell = getCell(p.x, p.y);
                    var vx = Math.cos(cell.angle) * cell.speed * 1.6;
                    var vy = Math.sin(cell.angle) * cell.speed * 1.6;

                    // Append current position to trail history
                    p.trail.push({ x: p.x, y: p.y });
                    if (p.trail.length > TRAIL_LENGTH) {
                        p.trail.shift();
                    }

                    // Life alpha: fade in/out
                    var life = p.age / p.maxAge;
                    var lifeAlpha = Math.sin(life * Math.PI);

                    // Draw the full trail — oldest points are faintest
                    if (p.trail.length > 1) {
                        for (var t = 1; t < p.trail.length; t++) {
                            // t/TRAIL_LENGTH: 0 at tail, 1 at head
                            var trailFrac = t / p.trail.length;
                            var alpha = p.alpha * lifeAlpha * trailFrac * trailFrac;
                            var r = 200 + Math.floor(lifeAlpha * 55);
                            var g = 230 + Math.floor(lifeAlpha * 25);
                            var b = 255;
                            ctx.beginPath();
                            ctx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
                            ctx.lineTo(p.trail[t].x, p.trail[t].y);
                            ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
                            ctx.lineWidth = p.width * trailFrac;
                            ctx.lineCap = 'round';
                            ctx.stroke();
                        }
                    }

                    p.px = p.x;
                    p.py = p.y;
                    p.x += vx;
                    p.y += vy;

                    // Wrap edges
                    if (p.x < -10) { p.x = canvas.width + 10; p.px = p.x; p.trail = []; }
                    if (p.x > canvas.width + 10) { p.x = -10; p.px = p.x; p.trail = []; }
                    if (p.y < -10) { p.y = canvas.height + 10; p.py = p.y; p.trail = []; }
                    if (p.y > canvas.height + 10) { p.y = -10; p.py = p.y; p.trail = []; }
                }

                requestAnimationFrame(animate);
            }

            function updateWindInfo(dir, speed) {
                var directions = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
                var idx = Math.round(dir / 22.5) % 16;
                var cardDir = directions[idx];
                document.getElementById('wind-text').textContent =
                    cardDir + ' ' + speed.toFixed(1) + ' m/s  |  Holfuy #1589';
                // Rotate arrow to show wind direction (arrow points the way wind blows TO)
                var arrowDeg = (dir + 180) % 360;  // "to" direction
                document.getElementById('wind-arrow').setAttribute('transform', 'rotate(' + arrowDeg + ',12,12)');
            }

            async function fetchWind() {
                try {
                    var resp = await fetch('/api/wind');
                    var data = await resp.json();
                    // Holfuy API returns { wind: { speed, gust, min, direction }, ... }
                    if (data && data.wind && typeof data.wind === 'object') {
                        windDir = parseFloat(data.wind.direction) || windDir;
                        windSpeed = parseFloat(data.wind.speed) || windSpeed;
                    } else if (data && data.measurements && data.measurements.length > 0) {
                        var m = data.measurements[0];
                        if (m.wind && typeof m.wind === 'object') {
                            windDir = parseFloat(m.wind.direction) || windDir;
                            windSpeed = parseFloat(m.wind.speed) || windSpeed;
                        } else {
                            windDir = parseFloat(m.windDirection) || windDir;
                            windSpeed = parseFloat(m.wind) || windSpeed;
                        }
                    } else if (data && (data.windDirection !== undefined || data.windDir !== undefined)) {
                        windDir = parseFloat(data.windDirection || data.windDir) || windDir;
                        windSpeed = parseFloat(data.windSpeed || data.wind) || windSpeed;
                    }
                    console.log('Holfuy wind data:', data, '-> dir:', windDir, 'speed:', windSpeed);
                    updateWindInfo(windDir, windSpeed);
                    buildField();
                } catch (e) {
                    console.warn('Holfuy wind fetch failed, using defaults:', e);
                    updateWindInfo(windDir, windSpeed);
                    buildField();
                }
            }

            // Init
            window.addEventListener('resize', function () {
                resize();
                initParticles();
            });
            resize();
            initParticles();
            fetchWind();
            // Refresh wind data every 5 minutes
            setInterval(fetchWind, 300000);
            animate();
        })();
        </script>
