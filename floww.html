<!DOCTYPE html>
<html>
	<head>
		<title>Jaunciema Osta</title>
		<style>
			* {
				margin: 0px;
			}
		</style>
	</head>
	<body>
		<div id="shader"></div>
		<script id="vertex" type="x-shader/x-vertex">
			varying vec2 vUv;
			void main() { gl_Position = vec4(position, 1.0);
			             vUv = uv;
			            }
		</script>

		<script id="fragment" type="x-shader/x-fragment">
			   precision highp float;

			uniform vec2 u_resolution;
			uniform float uTime;
			  uniform float u_number;
			  varying vec2 vUv;
			  uniform vec2 uMouse;



			const float PI = 3.1415926535897932384626433832795;
			const float TAU = PI * 2.;

			uniform float u_progress;

			void coswarp(inout vec3 trip, float warpsScale ){

			    trip.xyz += warpsScale * .1 * sin(3. * trip.yzx + (uTime * .15));
			    trip.xyz += warpsScale * .05 * sin(11. * trip.yzx + (uTime * .15));
			    trip.xyz += warpsScale * .025 * sin(17. * trip.yzx + (uTime * .15));

			  }

			  void uvRipple(inout vec2 uv, float intensity){

			  vec2 p = uv -.5;


			    float cLength=length(p);

			     uv= uv +(p/cLength)*cos(cLength*15.0-uTime*.5)*intensity;

			}

			void main() {
			  vec2 uv = (gl_FragCoord.xy - u_resolution * .5) / u_resolution.yy + 0.5;

			 float t = (uTime * .2) + length(uv-.5);


			  uvRipple(uv, .2 * sin(t));



			  vec3 color = vec3(uv.x,uv.y, 1.);

			  coswarp(color, 3.);
			  coswarp(color, 3.);
			  coswarp(color, 3.);

			 vec3 color2 = color;

			  color = vec3(1.);

			  color = mix(color, 1.-color, step(length(uv-.5), .5 * color2.r));


			  if(color == vec3(0.)){
			    color = vec3(step(color2.r, .4), step(color2.r, .6), step(color2.r, .8));
			  }


			    gl_FragColor = vec4(vec3(color.r, color.g, color.b), 1.);




			}
		</script>
		<script type="module" type="text/javascript">
			import * as THREE from "https://cdn.skypack.dev/three@0.150.1";

			let camera, scene, renderer, clock;
			let uniforms;

			function init() {
				const container = document.getElementById("shader");

				clock = new THREE.Clock();
				camera = new THREE.Camera();
				camera.position.z = 1;

				scene = new THREE.Scene();

				const geometry = new THREE.PlaneBufferGeometry(2, 2);

				uniforms = {
					uTime: { type: "f", value: 1.0 },
					u_resolution: { type: "v2", value: new THREE.Vector2() },
					u_progress: {
						value: 0,
					},
					uMouse: {
						value: { x: 0.5, y: 0.5 },
					},
				};

				const material = new THREE.ShaderMaterial({
					uniforms,
					vertexShader: document.getElementById("vertex").textContent,
					fragmentShader: document.getElementById("fragment").textContent,
				});

				const mesh = new THREE.Mesh(geometry, material);
				scene.add(mesh);

				renderer = new THREE.WebGLRenderer();
				renderer.setPixelRatio(window.devicePixelRatio);

				let running = false;

				let finished = function () {
					running = false;
				};

				window.addEventListener("mousemove", function (e) {
					material.uniforms.uMouse.value.x =
						(event.clientX / window.innerWidth) * 2 - 1;
					material.uniforms.uMouse.value.y =
						-(event.clientY / window.innerHeight) * 2 + 1;
				});

				window.addEventListener("click", function (e) {
					if (!running) {
						running = true;
						gsap.to(material.uniforms.u_progress, {
							duration: 6.5,
							value: material.uniforms.u_progress.value + 10,
							delay: 0,
							onComplete: finished,
						});
					}
				});

				container.appendChild(renderer.domElement);

				onWindowResize();
				window.addEventListener("resize", onWindowResize);
			}

			function onWindowResize() {
				renderer.setSize(window.innerWidth, window.innerHeight);
				uniforms.u_resolution.value.x = renderer.domElement.width;
				uniforms.u_resolution.value.y = renderer.domElement.height;
			}

			function render() {
				uniforms.uTime.value = clock.getElapsedTime();
				renderer.render(scene, camera);
			}

			function animate() {
				render();
				requestAnimationFrame(animate);
			}

			init();
			animate();
		</script>
	</body>
</html>
